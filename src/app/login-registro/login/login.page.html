<ion-header [translucent]="true">
</ion-header>

<ion-content [fullscreen]="true" class="login">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">login</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-grid style="height: 100%; display: grid; align-items: center;">
    <ion-row style=" width: 100%" class="ion-justify-content-center">
      <ion-col size="12" size-md="8" size-lg="4">
        <ion-card>
          <ion-card-header>
            <h1 class="ion-text-center">Iniciar sesión</h1>
          </ion-card-header>
          <ion-card-content>
            <form [formGroup]="profileForm" class="ion-margin-bottom">
              <ion-input class="ion-margin-bottom" id="email" formControlName="email" type="email" label="Correo electrónico"
                         labelPlacement="floating" fill="outline" placeholder="correo@correo.com"></ion-input>
              <ion-input class="ion-margin-bottom" label-placement="floating" id="password" formControlName="password"
                         type="password"
                         label="Contraseña" fill="outline" placeholder="●●●●●●●●"></ion-input>
              <ion-button expand="block" type="submit" [disabled]="!profileForm.valid" (click)="onLogin()">Iniciar
                sesion
              </ion-button>
            </form>
            <div class="ion-text-center">
              <a routerLink="/forgot-password" style="text-decoration: none;">
                Recuperar la contraseña
              </a>
            </div>
            <ion-item-divider class="ion-no-margin"></ion-item-divider>
            <div class="ion-text-center ion-margin-top">
              <ion-text color="medium">
                ¿Todavía no tienes cuenta?
              </ion-text>

              <a routerLink="/register" routerDirection="root" class="ion-margin-start" style="text-decoration: none; font-weight: bold;">
                ¡Regístrate ahora!
              </a>
            </div>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
